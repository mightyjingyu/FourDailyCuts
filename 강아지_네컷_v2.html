<meta charset="UTF-8">

<title>강아지 네컷 프레임 🐾</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #f0eaf8;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: 36px;
  padding: 48px 24px;
  font-family: 'Jua', sans-serif;
}

/* 배경 플로팅 */
.bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-i {
  position:absolute; opacity:.13;
  animation: bfloat linear infinite;
}
@keyframes bfloat {
  0%   { transform:translateY(110vh) rotate(0deg);   opacity:0; }
  8%   { opacity:.13; }
  92%  { opacity:.13; }
  100% { transform:translateY(-10vh)  rotate(360deg); opacity:0; }
}

/* ══ 카드 래퍼 ══ */
.card {
  position:relative; z-index:1;
  width: 240px;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 3px 5px 0 rgba(0,0,0,.18), 0 12px 28px rgba(0,0,0,.12);
  display: flex;
  flex-direction: column;
  animation: cardBob 3.5s ease-in-out infinite;
}
.card:nth-child(2){ animation-delay:.8s; }
.card:nth-child(3){ animation-delay:1.6s; }
@keyframes cardBob {
  0%,100%{ transform:translateY(0) rotate(-.4deg); }
  50%    { transform:translateY(-7px) rotate(.4deg); }
}

/* ══ 테마 1 : 다크 그린 (칠판) ══ */
.t1 { background: #1e3a2f; }
.t1 .hd   { background: #163025; border-bottom: 2px dashed #4a8c6a; }
.t1 .tag  { background:#2d5a42; color:#a8d8b8; border:1.5px solid #4a8c6a; }
.t1 .grid { background:#1e3a2f; }
.t1 .slot { border-color:#4a8c6a; background:rgba(255,255,255,.06); }
.t1 .slot:hover { border-color:#7fc99a; background:rgba(74,140,106,.15); border-style:solid; }
.t1 .div-line { background: repeating-linear-gradient(90deg,#4a8c6a 0,#4a8c6a 4px,transparent 4px,transparent 9px); }
.t1 .ft   { background:#163025; border-top:2px dashed #4a8c6a; }
.t1 .ft-main { color:#e8f5ee; }
.t1 .ft-sub  { color:#7fc99a; }

/* ══ 테마 2 : 버터 옐로우 (경고) ══ */
.t2 { background: #fffbe8; }
.t2 .hd   { background:#fff3b0; border-bottom:2px dashed #e8c000; }
.t2 .tag  { background:#fff3b0; color:#7a5a00; border:1.5px solid #e8c000; }
.t2 .grid { background:#fffbe8; }
.t2 .slot { border-color:#e8c000; background:rgba(255,243,176,.35); }
.t2 .slot:hover { border-color:#f0a800; background:rgba(255,220,0,.12); border-style:solid; }
.t2 .div-line { background: repeating-linear-gradient(90deg,#e8c000 0,#e8c000 4px,transparent 4px,transparent 9px); }
.t2 .ft   { background:#fff3b0; border-top:2px dashed #e8c000; }
.t2 .ft-main { color:#5a4000; }
.t2 .ft-sub  { color:#c08000; }

/* ══ 테마 3 : 연보라 (현타) ══ */
.t3 { background: #f3eeff; }
.t3 .hd   { background:#e8d8ff; border-bottom:2px dashed #b890e8; }
.t3 .tag  { background:#e8d8ff; color:#5a3a8a; border:1.5px solid #b890e8; }
.t3 .grid { background:#f3eeff; }
.t3 .slot { border-color:#c8a8f0; background:rgba(200,168,240,.12); }
.t3 .slot:hover { border-color:#9060d8; background:rgba(144,96,216,.1); border-style:solid; }
.t3 .div-line { background: repeating-linear-gradient(90deg,#c8a8f0 0,#c8a8f0 4px,transparent 4px,transparent 9px); }
.t3 .ft   { background:#e8d8ff; border-top:2px dashed #b890e8; }
.t3 .ft-main { color:#3a1a6a; }
.t3 .ft-sub  { color:#8050c0; }

/* ══ 헤더 ══ */
.hd {
  width:100%; padding:10px 12px 8px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  position:relative;
}
.char-wrap {
  animation: charWiggle 2s ease-in-out infinite;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.2));
}
@keyframes charWiggle {
  0%,100%{ transform:rotate(-3deg) translateY(0); }
  50%    { transform:rotate( 3deg) translateY(-4px); }
}
.tag {
  border-radius:50px; padding:3px 13px;
  font-size:.68rem; letter-spacing:.4px;
  animation: tagPop 2.5s ease-in-out infinite;
}
@keyframes tagPop {
  0%,100%{ transform:scale(1); }
  50%    { transform:scale(1.05); }
}

/* ══ 사진 그리드 ══ */
.grid {
  flex:1;
  padding:7px 8px;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr auto 1fr;
  gap:5px;
}
.slot {
  position:relative;
  aspect-ratio:1/1;
  border-radius:10px;
  border:2px dashed;
  overflow:hidden;
  cursor:pointer;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  transition:all .2s;
}
.slot:hover { transform:scale(1.02); }
.slot img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover; border-radius:8px;
  display:none;
}
.slot input[type=file] {
  position:absolute; inset:0;
  opacity:0; cursor:pointer;
}
.slot-ico  { font-size:1.6rem; }
.slot-lbl  { font-size:.58rem; color:#aaa; margin-top:2px; }

/* 중간 구분선 */
.div-row {
  display:flex; align-items:center;
  gap:4px; grid-column:1/-1; margin:0;
}
.div-line { flex:1; height:1.5px; border-radius:1px; opacity:.55; }
.div-ico {
  font-size:.8rem;
  animation:divSpin 4s linear infinite;
}
.div-ico:nth-child(3){ animation-delay:.7s; }
.div-ico:nth-child(5){ animation-delay:1.4s; }
@keyframes divSpin {
  0%  { transform:rotate(0deg)   scale(1); }
  50% { transform:rotate(180deg) scale(1.3); }
  100%{ transform:rotate(360deg) scale(1); }
}

/* ══ 푸터 ══ */
.ft {
  width:100%; padding:7px 12px 9px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
}
.ft-main {
  font-size:.82rem; text-align:center; line-height:1.45;
  animation: txtPop 3s ease-in-out infinite;
}
@keyframes txtPop {
  0%,100%{ letter-spacing:.2px; }
  50%    { letter-spacing:1px; }
}
.ft-sub {
  font-size:.65rem; letter-spacing:.5px;
  opacity:.8;
}

/* 하트 파티클 */
.hrt {
  position:absolute; pointer-events:none; z-index:20;
  font-size:.9rem; opacity:0;
  animation:hrtUp .9s linear forwards;
}
@keyframes hrtUp {
  0%  { transform:translateY(0) scale(.5); opacity:0; }
  20% { opacity:1; }
  100%{ transform:translateY(-80px) scale(1.2); opacity:0; }
}

/* ZZZ 애니메이션 */
.zzz {
  position:absolute;
  font-size:.7rem; font-weight:bold;
  animation:zzzFloat 2s ease-out infinite;
}
@keyframes zzzFloat {
  0%  { opacity:0; transform:translate(0,0) scale(.7); }
  30% { opacity:1; }
  100%{ opacity:0; transform:translate(12px,-22px) scale(1.1); }
}
.zzz:nth-child(2){ animation-delay:.6s; left:4px !important; }
.zzz:nth-child(3){ animation-delay:1.2s; left:10px !important; font-size:.9rem !important; }
</style>
</head>

      <img alt=""><span class="slot-ico">🔮</span><span class="slot-lbl">사진 추가</span>
      <input type="file" accept="image/*" onchange="load(event,this)">
    </div>
    <div class="slot" onclick="pick(this)">
      <img alt=""><span class="slot-ico">🔮</span><span class="slot-lbl">사진 추가</span>
      <input type="file" accept="image/*" onchange="load(event,this)">
    </div>
    <div class="div-row">
      <div class="div-line"></div>
      <span class="div-ico">😵</span><span class="div-ico">🐾</span><span class="div-ico">🫠</span>
      <div class="div-line"></div>
    </div>

      <img alt=""><span class="slot-ico">🔮</span><span class="slot-lbl">사진 추가</span>

    </div>

      <img alt=""><span class="slot-ico">🔮</span><span class="slot-lbl">사진 추가</span>

</div>


<script>
// 배경 생성
const bg = document.getElementById('BG');
const pool = ['⭐','🌸','💜','🐾','✨','💛','🩷','📚','💤','🌿'];
for(let i=0;i<22;i++){
  const e = document.createElement('span');
  e.className = 'bg-i';
  e.textContent = pool[i % pool.length];
  e.style.cssText = `left:${Math.random()*100}vw;font-size:${.8+Math.random()*1.4}rem;animation-duration:${11+Math.random()*15}s;animation-delay:${-Math.random()*20}s`;
  bg.appendChild(e);
}

function pick(slot){ slot.querySelector('input').click(); }

function load(e, input){
  const file = e.target.files[0]; if(!file) return;
  const slot = input.closest('.slot');
  const img  = slot.querySelector('img');
  const r = new FileReader();
  r.onload = ev => {
    img.src = ev.target.result;
    img.style.display = 'block';
    slot.querySelector('.slot-ico').style.display = 'none';
    slot.querySelector('.slot-lbl').style.display = 'none';
    boom(slot);
  };
  r.readAsDataURL(file);
}

function boom(slot){
  const emojis = ['❤️','🩷','💛','💜','✨'];
  for(let i=0;i<5;i++){
    const h = document.createElement('span');
    h.className = 'hrt';
    h.textContent = emojis[i%emojis.length];
    h.style.cssText = `left:${10+Math.random()*80}%;bottom:8px;animation-delay:${Math.random()*.3}s;animation-duration:${.7+Math.random()*.5}s`;
    slot.appendChild(h);
    setTimeout(()=>h.remove(), 1300);
  }
}
</script>
